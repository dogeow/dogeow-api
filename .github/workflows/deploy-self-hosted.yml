# 推送 main 后在国内自托管 Runner 上通过 Deployer 执行零停机部署。
# 前提：目标服务器配好 PHP/Composer/Supervisor/Nginx，runner 用户有 sudo supervisorctl 免密。
# 详情见 docs/DEPLOYMENT.md。
name: Deploy (Self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Deploy production
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SUPERVISOR_GROUP: ${{ secrets.SUPERVISOR_GROUP }}
        run: scripts/ensure-deployer.sh deploy production -v

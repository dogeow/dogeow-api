# 推送 main 后在国内自托管 Runner 上通过 Deployer 执行零停机部署。
# 前提：目标服务器配好 PHP/Composer/Supervisor/Nginx，runner 用户有 sudo supervisorctl 免密。
# 详情见 docs/DEPLOYMENT.md。
name: Deploy (Self-hosted)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5

      - name: Ensure Deployer phar present
        # 第一次部署时下载并缓存到 ~/.deployer/dep.phar，后续直接复用。
        # 用固定版本避免上游变更突然破坏构建。
        run: |
          set -euo pipefail
          DEP_BIN="$HOME/.deployer/dep.phar"
          DEP_VERSION="7.5.7"
          if [ ! -f "$DEP_BIN" ]; then
            mkdir -p "$(dirname "$DEP_BIN")"
            curl -fsSL "https://deployer.org/releases/v${DEP_VERSION}/deployer.phar" -o "$DEP_BIN"
            chmod +x "$DEP_BIN"
          fi
          php "$DEP_BIN" --version

      - name: Deploy production
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SUPERVISOR_GROUP: ${{ secrets.SUPERVISOR_GROUP }}
        run: php "$HOME/.deployer/dep.phar" deploy production -v
